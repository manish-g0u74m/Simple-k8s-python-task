name: Python application CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  scan:
    name: Code Security Scan
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔥 Install Trivy (manual)
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      # 🔹 Trivy FS Scan
      - name: Run Trivy FS Scan
        run: |
          trivy fs --scanners vuln,secret --severity HIGH,CRITICAL --format table --output trivy-fs-report.txt .

      # 🔥 Fail pipeline if vuln found
      - name: Fail if vulnerabilities found
        run: |
          trivy fs --scanners vuln,secret --severity HIGH,CRITICAL --exit-code 1 .

      # 🔹 Upload Report
      - name: Upload Trivy FS Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: trivy-fs-report.txt
          # retention-days optional hai (neeche explain 👇)


  sonarqube:
    name: SonarQube Scan
    runs-on: self-hosted
    needs: scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install SonarScanner
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip
          curl -sSLo sonar.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
          unzip sonar.zip
          sudo mv sonar-scanner-* /opt/sonar-scanner
          sudo ln -sf /opt/sonar-scanner/bin/sonar-scanner /usr/local/bin/sonar-scanner

      - name: Run SonarQube Scan
        run: |
          sonar-scanner \
            -Dsonar.projectKey=simple-python-app \
            -Dsonar.projectName="Simple Python App" \
            -Dsonar.sources=. \
            -Dsonar.host.url=${{ secrets.SONARQUBE_HOST }} \
            -Dsonar.login=${{ secrets.SONARQUBE_TOKEN }}

      - name: Quality Gate Check
        id: quality-gate
        uses: sonarsource/sonarqube-quality-gate-action@master
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONARQUBE_HOST }}


  update-env:
    name: Update Secrets
    runs-on: self-hosted
    needs: sonarqube

    steps:
      - uses: actions/checkout@v4

      - name: Update .env file
        run: |
          python3 update-secrets.py


  docker:
    name: Docker Build, Scan & Push
    runs-on: self-hosted
    needs: update-env

    steps:
      - uses: actions/checkout@v4

      # 🔥 Install Trivy again (new job = new environment)
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
          -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_IMAGE }}:latest .

      # 🔥 Trivy Image Scan
      - name: Scan Docker Image
        run: |
          trivy image --severity HIGH,CRITICAL --exit-code 1 ${{ secrets.DOCKER_IMAGE }}:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_IMAGE }}:latest
